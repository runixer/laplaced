version: "2"
linters:
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - misspell
    - unconvert
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
  exclusions:
    generated: lax
    # Standard exclusion presets: suppress universal Go patterns like
    # `defer x.Close()` without error handling (std-error-handling),
    # well-known false positives, and comment-related noise.
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Tests generate throwaway fixtures (0644 file perms, unchecked bodies,
      # commented-out debug code). Don't enforce production-grade hygiene there.
      - linters:
          - bodyclose
          - gocritic
          - gosec
        path: _test\.go
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - goimports
