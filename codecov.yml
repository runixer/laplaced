coverage:
  status:
    project:
      default:
        target: 78%          # Adjusted target based on excluded packages
        threshold: 1%
        if_ci_failed: error  # Fail if CI fails (not just coverage drop)
    patch:
      default:
        target: auto
        threshold: 1%

ignore:
  # Entry points (DI wiring, no business logic)
  - "cmd/bot/*.go"
  - "cmd/testbot/*.go"

  # Test infrastructure (not production code)
  - "internal/testutil/**/*.go"
  - "internal/agent/testing/**/*.go"

  # Type definitions only (no logic to test)
  - "internal/agent/prompts/**/*.go"

  # App wiring (no business logic)
  - "internal/app/**/*.go"

  # Generated code
  - "internal/gen/**/*.go"

  # Standard test exclusions
  - "**/*_test.go"
  - "**/mock_*.go"
  - "**/*_gen.go"
