# Log configuration
log:
  level: "info"

# Server Configuration
server:
  listen_port: "9081"
  debug_mode: false
  auth:
    enabled: true
    username: "admin"
    password: ""

# Transport: chat backend. "telegram" (default) | "mattermost" (Mattermost/Time).
transport: "telegram"

# Telegram Bot Configuration
telegram:
  token: ""
  webhook_url: ""
  proxy_url: ""

# Mattermost/Time Configuration (used when transport: "mattermost")
# server_url/bot_token/allowed_user_ids come from an overlay config + env.
# proxy_url is an optional egress proxy (per-client only — never a global HTTP_PROXY).
mattermost:
  server_url: ""
  bot_token: ""
  proxy_url: ""
  allowed_user_ids: []
  # principal_resolver (optional): its mere presence turns on principal identity
  # resolution for DMs — many of one person's transport handles share one memory
  # scope. Absent (default) = passthrough: every DM sender gets
  # its own isolated scope, exactly as before. The trust gate is the account's
  # auth_service (never the self-claimed email); local accounts are never linked.
  # principal_resolver:
  #   # Restrict which auth_service values are trusted. Empty = any non-empty
  #   # auth_service. Local accounts (auth_service == "") are never linked.
  #   trusted_auth_services: ["saml"]

# LLM API configuration (any OpenAI-compatible endpoint: OpenRouter, litellm, vLLM)
llm:
  api_key: ""
  base_url: "https://openrouter.ai/api/v1"  # OpenAI-compatible endpoint; override for self-hosted (litellm/vLLM)
  image_input_format: "file"  # "file" (OpenRouter/Gemini) | "openai" (image_url/video_url for litellm/vLLM)
  proxy_url: ""
  pdf_parser_engine: "native"
  request_cost: 0.0
  price_tiers:
    - up_to_tokens: 200000
      prompt_cost: 1.25
      completion_cost: 10.0
    - up_to_tokens: 1048576
      prompt_cost: 2.50
      completion_cost: 15.0
  # Provider routing (OpenRouter-only extension; ignored by other backends):
  # prefer Vertex (Google) first, fall back to AI Studio. AI Studio has been
  # less reliable for Gemini 3 preview models; keeping it as a safety net so
  # a single-provider outage doesn't take the bot down.
  # See https://openrouter.ai/docs/features/provider-routing
  # Override by setting LAPLACED_LLM_PROVIDER_ORDER (comma-separated)
  # or clearing the list in a local config. For strict routing (no fallback),
  # set allow_fallbacks: false in YAML.
  provider:
    order: ["Google", "Google AI Studio"]

# Agents Configuration
agents:
  # Default model for all agents (used when agent's model is not specified)
  default:
    name: "Agent"
    model: "google/gemini-3.1-flash-lite-preview"

  # Main bot - talks to users.
  # thinking_level: "minimal".."high" set an explicit reasoning effort;
  # "auto" omits the field so Gemini picks its own budget (dynamic thinking);
  # "off" is a legacy alias of "auto" on Gemini, not a real off-switch.
  # "auto" is the default: measured on gemini-3.5-flash, "low" yields ZERO
  # reasoning tokens — the model skips arithmetic/constraint checks on
  # planning-heavy asks and answer quality becomes a dice roll. The costs of
  # "auto" are moderate extra latency and unbounded per-turn thinking budget.
  # An explicit level historically also prevented reasoning from leaking into
  # message.content (Gemini 3.1 Pro, see docs/bugs/2026-04-22-laplace-thought-leak/)
  # — with "auto", watch the bot.anomaly.sanitized span attribute.
  chat:
    name: "Laplaced"
    model: "google/gemini-3.5-flash"
    thinking_level: "auto"
    # Alternative: "google/gemini-3.1-pro-preview" — stronger on complex
    # multi-tool reasoning, but slower and noticeably more expensive per turn.

  # Archivist - extracts facts and people from conversations
  archivist:
    name: "Archivist"
    # model: uses default
    thinking_level: "high"  # High reasoning for better fact/people extraction quality
    timeout: "120s"           # Longer timeout for multi-turn
    max_tool_calls: 2         # Usually 0-1, max 2 for complex sessions

  # Enricher - expands search queries for RAG
  enricher:
    name: "Enricher"
    # model: uses default

  # Reactor - reacts to user messages with an emoji when natural
  reactor:
    name: "Reactor"
    enabled: true
    # model: uses default

  # Reranker - filters and ranks RAG candidates
  reranker:
    name: "Reranker"
    model: "google/gemini-3.1-flash-lite-preview"
    enabled: true
    timeout: "60s"
    turn_timeout: "30s"
    max_tool_calls: 3
    thinking_level: "minimal"

    # Per-type limits (v0.6.0)
    topics:
      candidates_limit: 50
      max: 5
    people:
      candidates_limit: 20
      max: 10
    artifacts:
      candidates_limit: 20
      max: 10                # Max artifacts in final selection (also used as max_context_artifacts)
      max_context_bytes: 52428800  # 50MB cumulative limit for artifact content
      # Session-aware injection: artifacts attached to messages still in the active
      # session (topic_id IS NULL) are added to the candidate pool with a (session) tag,
      # bypassing vector search. The reranker decides whether to actually pick them.
      session:
        max: 5
        max_age: "24h"

    # Legacy fields (deprecated, for migration only)
    candidates: 50
    max_topics: 5
    max_people: 10

  # Splitter - splits large topics into smaller ones
  splitter:
    name: "Splitter"
    # model: uses default

  # Merger - merges similar topics
  merger:
    name: "Merger"
    # model: uses default

  # Extractor - extracts content from artifacts (images, audio, PDF, etc.)
  extractor:
    name: "Extractor"
    model: "google/gemini-3.1-flash-lite-preview"
    # Processing settings (v0.6.0)
    max_file_size_mb: 20        # Max file size for extraction
    timeout: "2m"               # Max time for single artifact extraction
    max_retries: 3              # Max retry attempts for failed artifacts
    polling_interval: "30s"     # How often to check for pending artifacts
    max_concurrent: 3           # Max artifacts to process simultaneously
    recovery_threshold: "10m"   # How long 'processing' state before recovery on startup
    recent_message_count: 10    # Number of recent session messages to include in artifact context (0 = disable)

  # Image generator - creates/edits images (v0.8.0).
  # Two verified configurations below — pick one. supported_image_sizes /
  # supported_aspect_ratios drive the generate_image tool's JSON schema, so the
  # LLM only sees options the upstream model actually accepts; switching models
  # requires updating these lists or you'll get runtime 400s.
  image_generator:
    name: "ImageGenerator"
    model: "openai/gpt-5.4-image-2"
    timeout: "720s"                # ~10x slower than nano banana; first call routinely runs minutes, the previous 90s/180s caps tripped it
    default_aspect_ratio: "9:16"   # Vertical phone format. Only applied for text-to-image; edits keep the input image's own ratio.
    default_image_size: "1K"
    # Curl-verified for openai/gpt-5.4-image-2: image_size accepts {"1K","2K"} only
    # (0.5K and 4K return 400); aspect_ratio drops the {1:4, 4:1, 1:8, 8:1} extremes.
    supported_image_sizes: ["1K", "2K"]
    supported_aspect_ratios:
      - "1:1"
      - "2:3"
      - "3:2"
      - "3:4"
      - "4:3"
      - "4:5"
      - "5:4"
      - "9:16"
      - "16:9"
      - "21:9"
    # Alternative: google/gemini-3.1-flash-image-preview ("nano banana") — ~10x
    # faster, ~2x cheaper (~$0.07 per 1K image vs ~$0.13). Accepts {"1K","2K","4K"}
    # for image_size and four additional aspect ratios {1:4, 4:1, 1:8, 8:1}.
    # To switch, replace the four fields above with:
    #
    # model: "google/gemini-3.1-flash-image-preview"
    # timeout: "90s"
    # supported_image_sizes: ["1K", "2K", "4K"]
    # supported_aspect_ratios:
    #   - "1:1"
    #   - "2:3"
    #   - "3:2"
    #   - "3:4"
    #   - "4:3"
    #   - "4:5"
    #   - "5:4"
    #   - "9:16"
    #   - "16:9"
    #   - "21:9"
    #   - "1:4"
    #   - "4:1"
    #   - "1:8"
    #   - "8:1"
    max_input_images: 4            # Max reference images accepted as tool input
    max_output_images: 4           # Max images shown to user per tool call
    max_input_image_bytes: 20971520 # 20MB per input image
    document_threshold_bytes: 2097152 # 2MB: larger outputs sent as Document (no Telegram recompression) instead of Photo
    max_concurrent: 4              # Parallel generate_image calls per turn ("draw three pictures"); other tools stay sequential

# Embedding Configuration
# v0.7.0: migrated to gemini-embedding-2-preview at 1536 dim.
# On startup, vectors produced under a different model/dim are re-embedded in place
# (see internal/rag/reembed.go + docs/architecture/embedding-storage.md).
embedding:
  model: "google/gemini-embedding-2-preview"
  dimensions: 1536

# RAG Configuration
rag:
  enabled: true
  max_context_messages: 50
  max_profile_facts: 50
  retrieved_messages_count: 20
  retrieved_topics_count: 5
  similarity_threshold: 0.5
  consolidation_similarity_threshold: 0.8
  min_safety_threshold: 0.3
  max_chunk_size: 400
  backfill_batch_size: 20
  backfill_interval: "1m"
  chunk_interval: "1h"
  split_threshold_chars: 25000
  recent_topics_in_context: 3

# Tools Configuration
tools:
  - name: "internet_search"
    model: "perplexity/sonar-pro"
  - name: "search_history"
    model: "memory"
  - name: "manage_memory"
    model: "memory"
  - name: "search_people"
    model: "memory"
  - name: "manage_people"
    model: "memory"
  - name: "generate_image"
    model: "openai/gpt-5.4-image-2"

# Bot Configuration
bot:
  language: "en"
  turn_wait_duration: "2s"
  # Progressive (streaming) replies via editMessageText. The bot sends a
  # placeholder immediately, edits it with tool-execution status, and reveals
  # LLM content as SSE deltas arrive. Telegram clients animate the edits.
  # Set LAPLACED_BOT_STREAMING_ENABLED=false to fall back to one-shot replies.
  streaming:
    enabled: true
    edit_throttle_ms: 1000   # min interval between edits to the same bubble
    edit_min_chars: 80       # earlier edit allowed once this many new chars accumulate
    max_buffer_chars: 3400   # past this, finalize first bubble and switch to multi-message send

# Database Configuration
database:
  # driver selects the backend: "sqlite" (default) or "postgres".
  driver: "sqlite"
  path: "data/laplaced.db"
  # PostgreSQL backend (driver: postgres). Password MUST come from the env var
  # LAPLACED_DATABASE_PASSWORD, never a committed literal.
  # postgres:
  #   host: "<postgres-host>"
  #   port: 5432
  #   database: "laplaced"
  #   user: "laplaced"
  #   sslmode: "require"

# Telemetry Configuration (OpenTelemetry export)
# Disabled by default. Flip `enabled: true` (or LAPLACED_TELEMETRY_ENABLED=true)
# when a local OTLP collector is reachable on otlp_endpoint. Traces only in
# this iteration; metrics and logs land in subsequent iterations.
telemetry:
  enabled: false
  otlp_endpoint: "localhost:4317"
  service_name: "laplaced"

# Artifacts Configuration (v0.6.0)
artifacts:
  enabled: true
  storage_path: "data/artifacts"
  allowed_types: ["image", "voice", "pdf", "video_note", "video", "document"]
  min_voice_duration_seconds: 300  # Only save voice messages >= 5min as artifacts (0 = save all, -1 = disable)
