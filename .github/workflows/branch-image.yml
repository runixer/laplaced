name: Branch Image

# Manually dispatched multi-arch image build from an arbitrary branch.
# Pushes to `ghcr.io/<repo>:<branch-slug>` only — no :latest, :main, or semver.
#
# Usage: gh workflow run branch-image.yml -f branch=<branch-name>

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build image from'
        required: true
        type: string

permissions: {}

env:
  GO_VERSION: '1.25'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-image:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Compute tag slug
        id: slug
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          SLUG=$(echo "$BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-50)
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "Image will be pushed as ${REGISTRY}/${IMAGE_NAME}:${SLUG}"

      - name: Build binaries
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          VERSION="${BRANCH}-${COMMIT}"
          for ARCH in amd64 arm64; do
            mkdir -p "bin/linux/${ARCH}"
            GOOS=linux GOARCH="${ARCH}" CGO_ENABLED=0 \
              go build -trimpath -buildvcs=false \
                -ldflags="-s -w -X main.Version=${VERSION}" \
                -o "bin/linux/${ARCH}/laplaced" ./cmd/bot
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.slug.outputs.slug }}
